<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="noteBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F6F3"/>
      <stop offset="100%" style="stop-color:#F0EDE8"/>
    </linearGradient>
    <linearGradient id="pen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8BAA9D"/>
      <stop offset="100%" style="stop-color:#6B8E7E"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" fill="#6B8E7E" rx="80"/>
  <!-- ノート本体 -->
  <rect x="130" y="100" width="252" height="320" rx="16" fill="url(#noteBg)" stroke="#D8C3A5" stroke-width="10"/>
  <!-- 綴じ部分（左） -->
  <rect x="120" y="100" width="28" height="320" rx="14" fill="#E5DFD6" stroke="#D8C3A5" stroke-width="6"/>
  <line x1="134" y1="120" x2="134" y2="400" stroke="#D8C3A5" stroke-width="2" stroke-dasharray="8 6"/>
  <!-- 横線（メモのイメージ） -->
  <line x1="170" y1="180" x2="360" y2="180" stroke="#D8C3A5" stroke-width="6" stroke-linecap="round"/>
  <line x1="170" y1="240" x2="340" y2="240" stroke="#D8C3A5" stroke-width="6" stroke-linecap="round"/>
  <line x1="170" y1="300" x2="320" y2="300" stroke="#D8C3A5" stroke-width="6" stroke-linecap="round"/>
  <line x1="170" y1="360" x2="280" y2="360" stroke="#D8C3A5" stroke-width="6" stroke-linecap="round"/>
  <!-- ペン -->
  <rect x="300" y="60" width="18" height="180" rx="4" fill="url(#pen)" transform="rotate(-25 309 150)" stroke="#5A7A6D" stroke-width="3"/>
  <polygon points="309,50 324,70 294,70" fill="#6B8E7E" stroke="#5A7A6D" stroke-width="3" transform="rotate(-25 309 60)"/>
  <rect x="302" y="225" width="14" height="35" rx="2" fill="#D8C3A5" transform="rotate(-25 309 242)"/>
</svg>
